<DOCUMENT filename="read.html">
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성경 읽기</title>
  <style>
    body {
      margin: 0;
      font-family: "맑은 고딕", Malgun Gothic, "돋움", dotum, sans-serif;
      background: #f0f4f8;
      color: #333;
    }
	
    /* 위쪽 라인 */
    header {
      background: #0066cc;
      color: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .back-btn {
      background: none;
      border: none;
      color: white;
      font-size: 28px;
      cursor: pointer;
	  margin: 0 auto; 
    }
    .title {
      font-size: 18px;
      font-weight: bold;
    }
    .container {
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
      background: white;
      min-height: 100vh;
    }
	
    .controls {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    select {
      padding: 8px;
      font-size: 15px;
      border-radius: 6px;
      border: 1px solid #ccc;
      flex: 1;
    }
    .nav-buttons {
      display: flex;
      justify-content: space-between;
      margin: 16px 0;
    }
    .nav-btn {
      padding: 10px 24px;
      font-size: 15px;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .nav-btn:disabled {
      background: #aaa;
      cursor: not-allowed;
    }
    #chapter-title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin: 12px 0;
    }
    #content {
      line-height: 1.7;
      font-size: 16px;
      white-space: pre-wrap;
      word-break: keep-all;
    }
    .verse-num {
      color: #0066cc;
      font-weight: bold;
      margin-right: 8px;
    }
  </style>
</head>
<body>

<header>
<button class="back-btn" 
        onclick="window.location.href='index.html'" 
        style="font-size: 20px; padding: 8px 12px; display: inline-flex; align-items: center; justify-content: center; min-width: 80px; line-height: 1;">메인</button>

<div style="margin-top:5px; padding:10px;">

</header>

<div class="container">
  <div class="controls">
    <select id="bibleVersion">
      <option value="kornkrvs.json" selected>개역개정</option>
      <option value="Korhrvs.json">개역한글</option>
      <option value="korhkjvs.json">흠정역</option>
      <option value="kornrsvs.json">새번역</option>
      <option value="koreasys.json">쉬운성경</option>
      <option value="kordobs.json">우리말성경</option>
      <option value="kortkvs.json">현대인의 성경</option>
      <option value="korklbs.json">현대어</option>
    </select>
  </div>

  <div class="controls">
    <select id="book"></select>
    <select id="chapter"></select>
  </div>

  <div class="nav-buttons">
    <button class="nav-btn" id="prevBtn" onclick="changeChapter(-1)">◀ 이전</button>
    <h2 id="chapter-title">Loading...</h2>
    <button class="nav-btn" id="nextBtn" onclick="changeChapter(1)">다음 ▶</button>
  </div>

  <div id="content"></div>

  <div class="nav-buttons" style="margin-top:24px;">
    <button class="nav-btn" id="prevBottom" onclick="changeChapter(-1)">◀ 이전 장</button>
    <button class="nav-btn" id="nextBottom" onclick="changeChapter(1)">다음 장 ▶</button>
  </div>
</div>

<script>
  const BookList = ["창세기","출애굽기","레위기","민수기","신명기","여호수아","사사기","룻기","사무엘상","사무엘하","열왕기상","열왕기하","역대상","역대하","에스라","느헤미야","에스더","욥기","시편","잠언","전도서","아가","이사야","예레미야","예레미야애가","에스겔","다니엘","호세아","요엘","아모스","오바댜","요나","미가","나훔","하박국","스바냐","학개","스가랴","말라기","마태복음","마가복음","누가복음","요한복음","사도행전","로마서","고린도전서","고린도후서","갈라디아서","에베소서","빌립보서","골로새서","데살로니가전서","데살로니가후서","디모데전서","디모데후서","디도서","빌레몬서","히브리서","야고보서","베드로전서","베드로후서","요한일서","요한이서","요한삼서","유다서","요한계시록"];

  const BookChapterCount = { 
    "창세기":50, "출애굽기":40, "레위기":27, "민수기":36, "신명기":34, "여호수아":24, "사사기":21, "룻기":4,
    "사무엘상":31, "사무엘하":24, "열왕기상":22, "열왕기하":25, "역대상":29, "역대하":36, "에스라":10, "느헤미야":13, "에스더":10,
    "욥기":42, "시편":150, "잠언":31, "전도서":12, "아가":8, "이사야":66, "예레미야":52, "예레미야애가":5, "에스겔":48, "다니엘":12,
    "호세아":14, "요엘":3, "아모스":9, "오바댜":1, "요나":4, "미가":7, "나훔":3, "하박국":3, "스바냐":3, "학개":2, "스가랴":14, "말라기":4,
    "마태복음":28, "마가복음":16, "누가복음":24, "요한복음":21, "사도행전":28, "로마서":16, "고린도전서":16, "고린도후서":13, "갈라디아서":6, "에베소서":6, "빌립보서":4, "골로새서":4, "데살로니가전서":5, "데살로니가후서":3, "디모데전서":6, "디모데후서":4, "디도서":3, "빌레몬서":1, "히브리서":13, "야고보서":5, "베드로전서":5, "베드로후서":3, "요한일서":5, "요한이서":1, "요한삼서":1, "유다서":1, "요한계시록":22
  };

  let currentBook = "창세기";
  let currentChapter = 1;
  let currentVersion = "kornkrvs.json";

  // ==================== 저장 함수 (추가) ====================
  function saveCurrentPosition() {
    localStorage.setItem("lastReadBook", currentBook);
    localStorage.setItem("lastReadChapter", currentChapter);
    localStorage.setItem("lastBibleVersion", currentVersion);
  }

  // ==================== 불러오기 ====================
  function loadLastRead() {
    currentBook = localStorage.getItem("lastReadBook") || "창세기";
    currentChapter = parseInt(localStorage.getItem("lastReadChapter")) || 1;
    currentVersion = localStorage.getItem("lastBibleVersion") || "kornkrvs.json";
    
    document.getElementById("bibleVersion").value = currentVersion;
    document.getElementById("book").value = currentBook;
    updateChapterSelect();
    document.getElementById("chapter").value = currentChapter;
  }

  function fillBookSelect() {
    const sel = document.getElementById("book");
    sel.innerHTML = "";
    BookList.forEach(b => {
      const opt = document.createElement("option");
      opt.value = opt.textContent = b;
      sel.appendChild(opt);
    });
  }

  function updateChapterSelect() {
    const book = document.getElementById("book").value;
    const sel = document.getElementById("chapter");
    sel.innerHTML = "";
    const count = BookChapterCount[book] || 1;
    for (let i = 1; i <= count; i++) {
      const opt = document.createElement("option");
      opt.value = opt.textContent = i;
      sel.appendChild(opt);
    }
  }

  function changeChapter(delta) {
    let newChapter = currentChapter + delta;
    const max = BookChapterCount[currentBook] || 1;
    if (newChapter < 1) newChapter = 1;
    if (newChapter > max) newChapter = max;
    
    currentChapter = newChapter;
    document.getElementById("chapter").value = currentChapter;
    loadChapter();
    saveCurrentPosition();        // ← 저장 추가
  }

  async function loadChapter() {
    try {
      const title = document.getElementById("chapter-title");
      const content = document.getElementById("content");
      title.textContent = `${currentBook} ${currentChapter}장`;
      content.innerHTML = "로딩 중...";

      const res = await fetch(`/${currentVersion}`);
      if (!res.ok) throw new Error("파일 로드 실패");
      const data = await res.json();

      const bookData = data.books?.[currentBook]?.[currentChapter];
      let html = "";
      for (let v in bookData) {
        html += `<span class="verse-num">${v}</span>${bookData[v]}<br><br>`;
      }
      content.innerHTML = html || "내용이 없습니다.";

      saveCurrentPosition();     // ← 저장 추가
    } catch (err) {
      document.getElementById("content").innerHTML = `<p style="color:red">오류: ${err.message}</p>`;
    }
  }

  // 초기화
  window.addEventListener('load', () => {
    fillBookSelect();
    loadLastRead();
    
    document.getElementById("book").addEventListener("change", () => {
      currentBook = document.getElementById("book").value;
      updateChapterSelect();
      loadChapter();
      saveCurrentPosition();
    });

    document.getElementById("chapter").addEventListener("change", () => {
      currentChapter = parseInt(document.getElementById("chapter").value);
      loadChapter();
      saveCurrentPosition();
    });

    document.getElementById("bibleVersion").addEventListener("change", () => {
      currentVersion = document.getElementById("bibleVersion").value;
      loadChapter();
      saveCurrentPosition();
    });

    loadChapter();
  });

  // 페이지 나갈 때도 저장 (추가 안전장치)
  window.addEventListener('beforeunload', saveCurrentPosition);
</script>
</body>
</html>
