<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성경 검색</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      background: #f9f9f9;
      color: #222;
      line-height: 1.6;
    }
    .container { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 1.5rem; margin-bottom: 1.2rem; }
    .search-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    select, input {
      padding: 8px 10px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 8px 18px;
      font-size: 0.95rem;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #0055aa; }

    #result {
      margin-top: 1.5rem;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 1.2rem 1.4rem;
    }

    .book-header {
      font-size: 1.1rem;
      font-weight: bold;
      margin: 1.8rem 0 0.8rem;
      color: #1a3c6d;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.4rem;
    }

    .chapter-block {
      margin: 1rem 0 1.8rem;
    }

    .chapter-title {
      font-weight: 600;
      color: #334;
      margin-bottom: 0.5rem;
    }

    .verse-text {
      margin: 0.4rem 0;
      padding-left: 1.2rem;
      text-indent: -1.2rem;
    }

    .verse-num {
      color: #0066cc;
      font-weight: 600;
      margin-right: 0.5em;
      font-size: 0.92rem;
    }

    mark {
      background: #fffacd;
      padding: 1px 3px;
      border-radius: 2px;
    }

    .total-info {
      font-weight: 500;
      color: #444;
      margin-bottom: 1.2rem;
    }

    .no-result {
      color: #777;
      padding: 3rem 0;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>성경 검색</h1>

  <div class="search-row">
    <select id="bibleVersion">
      <option value="kornkrvs.json" selected>개역개정</option>
      <option value="korhrvs.json">개역한글</option>
      <option value="korhkjvs.json">흠정역</option>
      <option value="kornrsvs.json">새번역</option>
      <option value="koreasys.json">쉬운성경</option>
      <option value="kordobs.json">우리말성경</option>
      <option value="kortkvs.json">현대인의 성경</option>
      <option value="korklbs.json">현대어</option>
    </select>

    <select id="startBook"><option value="">시작 책</option></select>
    <select id="startChapter"><option value="">장</option></select>
    <select id="endBook"><option value="">끝 책</option></select>
    <select id="endChapter"><option value="">장</option></select>
  </div>

  <div class="search-row">
    <input id="keyword" placeholder="검색어 입력" style="flex:1;">
    <button id="searchBtn">검색</button>
  </div>

  <div id="result"></div>
</div>

<script>
// (BookList, BookChapterCount는 이전과 동일하게 유지)
const BookList = [/* ... 생략 ... */];
const BookChapterCount = { /* ... 생략 ... */ };

let BibleData = null;

// DOM 요소들 (생략 없이 그대로)

window.addEventListener("load", () => {
  // 책·장 select 채우기 로직 (이전과 동일)
  // ... 생략 ...
});

async function loadBible(file) {

}

// 검색 버튼 클릭 시
searchButton.onclick = async () => {
  const kw = keywordInput.value.trim();
  if (!kw) {
    resultDiv.innerHTML = '<p class="no-result">검색어를 입력해주세요.</p>';
    return;
  }

  resultDiv.innerHTML = '<p style="color:#777; text-align:center; padding:4rem 0;">검색 중...</p>';

  if (!BibleData || versionSelect.value !== (document.querySelector("#bibleVersion").dataset.loaded || "")) {
    await loadBible(versionSelect.value);
    document.querySelector("#bibleVersion").dataset.loaded = versionSelect.value;
  }

  if (!BibleData) return;

  const lowerKw = kw.toLowerCase();
  const bookGroups = {};  // { "창세기": { "1": [구절들], "3": [구절들] } }
  let totalCount = 0;

  const startIdx = BookList.indexOf(startBookSelect.value) || 0;
  const endIdx   = BookList.indexOf(endBookSelect.value)   || BookList.length - 1;

  for (let i = startIdx; i <= endIdx; i++) {
    const book = BookList[i];
    const chapters = BibleData.books?.[book];
    if (!chapters) continue;

    const minCh = (i === startIdx) ? (parseInt(startChSelect.value) || 1) : 1;
    const maxCh = (i === endIdx)   ? (parseInt(endChSelect.value)   || 9999) : 9999;

    for (let ch = minCh; ch <= maxCh; ch++) {
      const verses = chapters[String(ch)];
      if (!verses) continue;

      let chapterVerses = [];

      for (const v in verses) {
        const text = verses[v];
        if (typeof text !== "string") continue;
        if (!text.toLowerCase().includes(lowerKw)) continue;

        const highlighted = text.replace(
          new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"),
          m => `<mark>${m}</mark>`
        );

        chapterVerses.push(`<span class="verse-num">${v}</span>${highlighted}`);
        totalCount++;
      }

      if (chapterVerses.length > 0) {
        if (!bookGroups[book]) bookGroups[book] = {};
        bookGroups[book][String(ch)] = chapterVerses;
      }
    }
  }

  if (totalCount === 0) {
    resultDiv.innerHTML = '<p class="no-result">검색 결과가 없습니다.</p>';
    return;
  }

  let html = `
    <div class="total-info">
      총 ${totalCount}개 구절이 검색되었습니다.
    </div>
  `;

  for (const book in bookGroups) {
    html += `<div class="book-header">${book}</div>`;

    const chapters = bookGroups[book];
    for (const ch in chapters) {
      html += `
        <div class="chapter-block">
          <div class="chapter-title">${ch}장</div>
          ${chapters[ch].map(v => `<div class="verse-text">${v}</div>`).join("")}
        </div>
      `;
    }
  }

  resultDiv.innerHTML = html;
};
</script>
</body>
</html>
