<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성경 검색</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 20px;
      background: #f9f9f9;
      color: #222;
      line-height: 1.45;
    }
    .container {
      max-width: 680px;
      margin: 0 auto;
    }
    h1 { font-size: 1.5rem; margin: 0 0 1.2rem; }
    .search-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 16px;
    }
    select, input {
      padding: 8px 10px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      padding: 8px 18px;
      font-size: 0.95rem;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover { background: #0055aa; }

    #result {
      margin-top: 1.5rem;
      background: white;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 16px 18px;
      min-height: 240px;
    }

    .book-header {
      font-size: 1.05rem;
      font-weight: 700;
      margin: 1.4rem 0 0.6rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #eee;
      color: #1a3c6d;
    }

    .result-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 0.94rem;
      line-height: 1.5;
    }
    .result-item:last-child {
      border-bottom: none;
    }
    .verse-ref {
      color: #0066cc;
      font-weight: 600;
      margin-right: 0.6em;
    }
    mark {
      background: #fffacd;
      padding: 1px 3px;
      border-radius: 2px;
    }
    .total-info {
      font-size: 0.98rem;
      color: #444;
      margin: 0.8rem 0 1.2rem;
      font-weight: 500;
    }
    .no-result {
      color: #666;
      padding: 2rem 0;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>성경 검색</h1>

  <div class="search-row">
    <select id="bibleVersion">
      <option value="kornkrvs.json" selected>개역개정</option>
      <option value="korhrvs.json">개역한글</option>
      <option value="korhkjvs.json">흠정역</option>
      <option value="kornrsvs.json">새번역</option>
      <option value="koreasys.json">쉬운성경</option>
      <option value="kordobs.json">우리말성경</option>
      <option value="kortkvs.json">현대인의 성경</option>
      <option value="korklbs.json">현대어</option>
    </select>

    <select id="startBook"><option value="">시작 책</option></select>
    <select id="startChapter"><option value="">장</option></select>
    <select id="endBook"><option value="">끝 책</option></select>
    <select id="endChapter"><option value="">장</option></select>
  </div>

  <div class="search-row">
    <input id="keyword" placeholder="검색어 입력 (예: 사랑, 은혜)" style="flex:1; min-width:180px;">
    <button id="searchBtn">검색</button>
  </div>

  <div id="result"></div>
</div>

<script>
// ── 데이터 (생략 없이 그대로) ────────────────────────────────────────
const BookList = ["창세기","출애굽기","레위기","민수기","신명기","여호수아","사사기","룻기","사무엘상","사무엘하","열왕기상","열왕기하","역대상","역대하","에스라","느헤미야","에스더","욥기","시편","잠언","전도서","아가","이사야","예레미야","예레미야애가","에스겔","다니엘","호세아","요엘","아모스","오바댜","요나","미가","나훔","하박국","스바냐","학개","스가랴","말라기","마태복음","마가복음","누가복음","요한복음","사도행전","로마서","고린도전서","고린도후서","갈라디아서","에베소서","빌립보서","골로새서","데살로니가전서","데살로니가후서","디모데전서","디모데후서","디도서","빌레몬서","히브리서","야고보서","베드로전서","베드로후서","요한일서","요한이서","요한삼서","유다서","요한계시록"];

const BookChapterCount = {"창세기":50,"출애굽기":40,"레위기":27,"민수기":36,"신명기":34,"여호수아":24,"사사기":21,"룻기":4,"사무엘상":31,"사무엘하":24,"열왕기상":22,"열왕기하":25,"역대상":29,"역대하":36,"에스라":10,"느헤미야":13,"에스더":10,"욥기":42,"시편":150,"잠언":31,"전도서":12,"아가":8,"이사야":66,"예레미야":52,"예레미야애가":5,"에스겔":48,"다니엘":12,"호세아":14,"요엘":3,"아모스":9,"오바댜":1,"요나":4,"미가":7,"나훔":3,"하박국":3,"스바냐":3,"학개":2,"스가랴":14,"말라기":4,"마태복음":28,"마가복음":16,"누가복음":24,"요한복음":21,"사도행전":28,"로마서":16,"고린도전서":16,"고린도후서":13,"갈라디아서":6,"에베소서":6,"빌립보서":4,"골로새서":4,"데살로니가전서":5,"데살로니가후서":3,"디모데전서":6,"디모데후서":4,"디도서":3,"빌레몬서":1,"히브리서":13,"야고보서":5,"베드로전서":5,"베드로후서":3,"요한일서":5,"요한이서":1,"요한삼서":1,"유다서":1,"요한계시록":22};

let BibleData = null;

// DOM
const versionSelect   = document.getElementById("bibleVersion");
const startBookSelect = document.getElementById("startBook");
const startChSelect   = document.getElementById("startChapter");
const endBookSelect   = document.getElementById("endBook");
const endChSelect     = document.getElementById("endChapter");
const keywordInput    = document.getElementById("keyword");
const searchButton    = document.getElementById("searchBtn");
const resultDiv       = document.getElementById("result");

// ── 초기화 ────────────────────────────────────────────────────
window.addEventListener("load", () => {
  BookList.forEach(book => {
    [startBookSelect, endBookSelect].forEach(sel => {
      const opt = document.createElement("option");
      opt.value = book;
      opt.textContent = book;
      sel.appendChild(opt);
    });
  });

  const updateChapters = (bookSel, chSel) => {
    const book = bookSel.value;
    chSel.innerHTML = '<option value="">장</option>';
    if (!book) return;
    const max = BookChapterCount[book] || 150;
    for (let i = 1; i <= max; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.textContent = i;
      chSel.appendChild(opt);
    }
  };

  startBookSelect.onchange = () => updateChapters(startBookSelect, startChSelect);
  endBookSelect.onchange   = () => updateChapters(endBookSelect, endChSelect);

  // 기본 전체 범위
  startBookSelect.value = BookList[0];
  endBookSelect.value   = BookList[BookList.length-1];
  updateChapters(startBookSelect, startChSelect);
  updateChapters(endBookSelect, endChSelect);

  loadBible(versionSelect.value);
});

async function loadBible(file) {
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error("파일 로드 실패");
    BibleData = await res.json();
  } catch (e) {
    resultDiv.innerHTML = `<p style="color:red">성경 파일 로드 실패: ${e.message}</p>`;
  }
}

// ── 검색 ──────────────────────────────────────────────────────
searchButton.onclick = async () => {
  const kw = keywordInput.value.trim();
  if (!kw) {
    resultDiv.innerHTML = '<p class="no-result">검색어를 입력해주세요.</p>';
    return;
  }

  resultDiv.innerHTML = '<p style="color:#777; text-align:center; padding:3rem 0;">검색 중...</p>';

  if (!BibleData || versionSelect.value !== (document.querySelector("#bibleVersion").dataset.loaded || "")) {
    await loadBible(versionSelect.value);
    document.querySelector("#bibleVersion").dataset.loaded = versionSelect.value;
  }

  if (!BibleData) return;

  const lowerKw = kw.toLowerCase();
  const bookGroups = {};
  let totalCount = 0;

  const startIdx = BookList.indexOf(startBookSelect.value);
  const endIdx   = BookList.indexOf(endBookSelect.value);

  for (let i = startIdx; i <= endIdx; i++) {
    const book = BookList[i];
    const chapters = BibleData.books?.[book];
    if (!chapters) continue;

    const minCh = (i === startIdx) ? (parseInt(startChSelect.value) || 1) : 1;
    const maxCh = (i === endIdx)   ? (parseInt(endChSelect.value)   || 9999) : 9999;

    let bookCount = 0;

    for (let ch = minCh; ch <= maxCh; ch++) {
      const verses = chapters[String(ch)];
      if (!verses) continue;

      for (const v in verses) {
        const text = verses[v];
        if (typeof text !== "string") continue;
        if (!text.toLowerCase().includes(lowerKw)) continue;

        const highlighted = text.replace(
          new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"),
          m => `<mark>${m}</mark>`
        );

        if (!bookGroups[book]) bookGroups[book] = [];
        bookGroups[book].push(`
          <div class="result-item">
            <span class="verse-ref">${book} ${ch}장 ${v}절</span>
            ${highlighted}
          </div>
        `);

        bookCount++;
        totalCount++;
      }
    }

    // 책별 그룹핑에 개수 정보 추가
    if (bookCount > 0 && bookGroups[book]) {
      bookGroups[book].unshift(`
        <div class="book-header">${book} (총 ${bookCount}개)</div>
      `);
    }
  }

  if (totalCount === 0) {
    resultDiv.innerHTML = '<p class="no-result">검색 결과가 없습니다.</p>';
    return;
  }

  let html = `
    <div class="total-info">
      총 ${totalCount}개 구절이 검색되었습니다.
    </div>
  `;

  for (const book in bookGroups) {
    html += bookGroups[book].join("");
  }

  resultDiv.innerHTML = html;
};
</script>
</body>
</html>
