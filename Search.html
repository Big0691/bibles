<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      font-family: system-ui, sans-serif;
      margin: 20px;
      background: #f8f9fa;
      color: #212529;
    }
    .container {
      max-width: 640px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.4rem;
      margin: 0 0 1.2rem;
    }
    .search-row {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    select, input {
      padding: 8px 10px;
      font-size: 1rem;
      border: 1px solid #ced4da;
      border-radius: 6px;
    }
    button {
      padding: 8px 16px;
      font-size: 1rem;
      background: #0d6efd;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #0b5ed7;
    }
    #result {
      white-space: pre-wrap;
      line-height: 1.5;
      margin-top: 1.5rem;
      padding: 16px;
      background: white;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      min-height: 200px;
    }
    .result-item {
      margin: 12px 0;
      padding: 12px;
      border-bottom: 1px solid #eee;
      cursor: pointer;
    }
    .result-item:hover {
      background: #f8f9fa;
    }
    mark {
      background: #fff3cd;
      padding: 2px 4px;
      border-radius: 3px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>성경 검색</h1>

  <div class="search-row">
    <select id="bibleVersion">
      <option value="kornkrvs.json" selected>개역개정</option>
      <option value="korhrvs.json">개역한글</option>
      <option value="korhkjvs.json">흠정역</option>
      <option value="kornrsvs.json">새번역</option>
      <option value="koreasys.json">쉬운성경</option>
      <option value="kordobs.json">우리말성경</option>
      <option value="kortkvs.json">현대인의 성경</option>
      <option value="korklbs.json">현대어</option>
    </select>

    <select id="startBook">
      <option value="">시작 책</option>
    </select>

    <select id="startChapter">
      <option value="">장</option>
    </select>

    <select id="endBook">
      <option value="">끝 책</option>
    </select>

    <select id="endChapter">
      <option value="">장</option>
    </select>
  </div>

  <div class="search-row">
    <input id="keyword" placeholder="검색어 입력" style="flex:1">
    <button id="searchBtn">검색</button>
  </div>

  <div id="result"></div>
</div>

<script>
// ── 기본 데이터 ────────────────────────────────────────────────
const BookList = [
  "창세기","출애굽기","레위기","민수기","신명기","여호수아","사사기","룻기",
  "사무엘상","사무엘하","열왕기상","열왕기하","역대상","역대하","에스라","느헤미야","에스더",
  "욥기","시편","잠언","전도서","아가","이사야","예레미야","예레미야애가","에스겔","다니엘",
  "호세아","요엘","아모스","오바댜","요나","미가","나훔","하박국","스바냐","학개","스가랴","말라기",
  "마태복음","마가복음","누가복음","요한복음","사도행전",
  "로마서","고린도전서","고린도후서","갈라디아서","에베소서","빌립보서","골로새서",
  "데살로니가전서","데살로니가후서","디모데전서","디모데후서","디도서","빌레몬서","히브리서",
  "야고보서","베드로전서","베드로후서","요한일서","요한이서","요한삼서","유다서","요한계시록"
];

const BookChapterCount = {
  "창세기":50,"출애굽기":40,"레위기":27,"민수기":36,"신명기":34,"여호수아":24,"사사기":21,"룻기":4,
  "사무엘상":31,"사무엘하":24,"열왕기상":22,"열왕기하":25,"역대상":29,"역대하":36,"에스라":10,"느헤미야":13,"에스더":10,
  "욥기":42,"시편":150,"잠언":31,"전도서":12,"아가":8,"이사야":66,"예레미야":52,"예레미야애가":5,"에스겔":48,"다니엘":12,
  "호세아":14,"요엘":3,"아모스":9,"오바댜":1,"요나":4,"미가":7,"나훔":3,"하박국":3,"스바냐":3,"학개":2,"스가랴":14,"말라기":4,
  "마태복음":28,"마가복음":16,"누가복음":24,"요한복음":21,"사도행전":28,
  "로마서":16,"고린도전서":16,"고린도후서":13,"갈라디아서":6,"에베소서":6,"빌립보서":4,"골로새서":4,
  "데살로니가전서":5,"데살로니가후서":3,"디모데전서":6,"디모데후서":4,"디도서":3,"빌레몬서":1,"히브리서":13,
  "야고보서":5,"베드로전서":5,"베드로후서":3,"요한일서":5,"요한이서":1,"요한삼서":1,"유다서":1,"요한계시록":22
};

let BibleData = null;

// ── DOM 요소 ─────────────────────────────────────────────────
const versionSelect   = document.getElementById("bibleVersion");
const startBookSelect = document.getElementById("startBook");
const startChSelect   = document.getElementById("startChapter");
const endBookSelect   = document.getElementById("endBook");
const endChSelect     = document.getElementById("endChapter");
const keywordInput    = document.getElementById("keyword");
const searchButton    = document.getElementById("searchBtn");
const resultDiv       = document.getElementById("result");

// ── 초기화 ───────────────────────────────────────────────────
window.addEventListener("load", () => {
  // 책 목록 채우기
  BookList.forEach(book => {
    const opt = document.createElement("option");
    opt.value = book;
    opt.text = book;
    startBookSelect.appendChild(opt.cloneNode(true));
    endBookSelect.appendChild(opt.cloneNode(true));
  });

  // 책 변경 → 장 옵션 업데이트
  const updateCh = (bookSel, chSel) => {
    const book = bookSel.value;
    chSel.innerHTML = '<option value="">장</option>';
    if (!book) return;
    const max = BookChapterCount[book] || 150;
    for (let i = 1; i <= max; i++) {
      const opt = document.createElement("option");
      opt.value = i;
      opt.text = i;
      chSel.appendChild(opt);
    }
  };

  startBookSelect.onchange = () => updateCh(startBookSelect, startChSelect);
  endBookSelect.onchange   = () => updateCh(endBookSelect,   endChSelect);

  // 초기값 설정 (전체 범위 기본)
  startBookSelect.value = BookList[0];
  endBookSelect.value   = BookList[BookList.length-1];
  updateCh(startBookSelect, startChSelect);
  updateCh(endBookSelect,   endChSelect);

  // 첫 데이터 로드
  loadBible(versionSelect.value);
});

// ── 데이터 로드 ──────────────────────────────────────────────
async function loadBible(file) {
  try {
    const r = await fetch(file);
    if (!r.ok) throw new Error("파일 로드 실패");
    BibleData = await r.json();
    resultDiv.innerHTML = "<p style='color:#6c757d'>성경 데이터가 로드되었습니다.</p>";
  } catch (e) {
    resultDiv.innerHTML = `<p style='color:red'>오류: ${e.message}</p>`;
  }
}

// ── 검색 ─────────────────────────────────────────────────────
searchButton.onclick = async () => {
  const kw = keywordInput.value.trim();
  if (!kw) {
    resultDiv.innerHTML = "<p style='color:#6c757d'>검색어를 입력해 주세요.</p>";
    return;
  }

  if (!BibleData) {
    resultDiv.innerHTML = "<p style='color:#6c757d'>성경 데이터를 로드 중입니다...</p>";
    await loadBible(versionSelect.value);
    if (!BibleData) return;
  }

  if (versionSelect.value !== document.querySelector("#bibleVersion").dataset.loaded) {
    await loadBible(versionSelect.value);
    document.querySelector("#bibleVersion").dataset.loaded = versionSelect.value;
  }

  resultDiv.innerHTML = "<p style='color:#6c757d'>검색 중...</p>";

  const lowerKw = kw.toLowerCase();
  const items = [];

  const startBookIdx = BookList.indexOf(startBookSelect.value);
  const endBookIdx   = BookList.indexOf(endBookSelect.value);

  if (startBookIdx < 0 || endBookIdx < 0 || startBookIdx > endBookIdx) {
    resultDiv.innerHTML = "<p style='color:#dc3545'>범위 설정이 잘못되었습니다.</p>";
    return;
  }

  let count = 0;
  const MAX = 300;

  outer: for (let i = startBookIdx; i <= endBookIdx; i++) {
    const book = BookList[i];
    const chapters = BibleData.books?.[book];
    if (!chapters) continue;

    const minCh = (i === startBookIdx) ? (parseInt(startChSelect.value) || 1) : 1;
    const maxCh = (i === endBookIdx)   ? (parseInt(endChSelect.value)   || 9999) : 9999;

    for (let ch = minCh; ch <= maxCh; ch++) {
      const chStr = String(ch);
      const verses = chapters[chStr];
      if (!verses) continue;

      for (const vs in verses) {
        const text = verses[vs];
        if (typeof text !== "string") continue;
        if (!text.toLowerCase().includes(lowerKw)) continue;

        const highlighted = text.replace(
          new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"),
          m => `<mark>${m}</mark>`
        );

        items.push(`
          <div class="result-item" 
               data-book="${book}" 
               data-chapter="${ch}">
            <strong>${book} ${ch}장 ${vs}절</strong><br>
            ${highlighted}
          </div>
        `);

        count++;
        if (count >= MAX) break outer;
      }
    }
  }

  if (items.length === 0) {
    resultDiv.innerHTML = `<p style='color:#6c757d'>"${kw}" 에 대한 검색 결과가 없습니다.</p>`;
  } else {
    resultDiv.innerHTML = `
      <p style="font-weight:bold; margin:0 0 12px">
        검색 결과: ${count}개 ${count >= MAX ? `(상위 ${MAX}개만 표시)` : ""}
      </p>
      ${items.join("")}
    `;
  }

  // 클릭 이벤트 연결
  document.querySelectorAll(".result-item").forEach(el => {
    el.onclick = () => {
      const book = el.dataset.book;
      const ch = parseInt(el.dataset.chapter);

      alert(`선택: ${book} ${ch}장\n(여기서 원하는 동작을 추가할 수 있습니다)`);
      // 예: 새 창 열기, 모달 표시, URL 이동 등
    };
  });
};
</script>
</body>
</html>
