<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>성경 검색</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      margin: 20px;
      background: #f9f9f9;
      color: #222;
      line-height: 1.6;
    }
    .container {
      max-width: 720px;
      margin: 0 auto;
    }
    .version-row {
      margin-bottom: 1.2rem;
      font-weight: 500;
    }
    .search-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 1.5rem;
    }
    select, input {
      padding: 8px 12px;
      font-size: 0.95rem;
      border: 1px solid #ccc;
      border-radius: 6px;
    }
    .range-label {
      font-weight: 600;
      color: #444;
      white-space: nowrap;
    }
    .arrow {
      font-size: 1.1rem;
      color: #666;
      margin: 0 8px;
    }
    button {
      padding: 8px 20px;
      font-size: 0.95rem;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover {
      background: #0055aa;
    }
    #result {
      margin-top: 1.5rem;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 1.2rem;
      min-height: 300px;
    }
    .total-info {
      font-weight: 600;
      color: #333;
      margin-bottom: 1.2rem;
    }
    .book-header {
      font-size: 1.15rem;
      font-weight: bold;
      color: #1a3c6d;
      margin: 2rem 0 0.8rem;
      padding-bottom: 0.4rem;
      border-bottom: 1px solid #eee;
    }
    .chapter-block {
      margin: 1.2rem 0 2rem;
    }
    .chapter-title {
      font-weight: 600;
      color: #334;
      margin-bottom: 0.6rem;
    }
    .verse-text {
      margin: 0.5rem 0;
      padding-left: 1.4rem;
      text-indent: -1.4rem;
      font-size: 0.96rem;
    }
    .verse-num {
      color: #0066cc;
      font-weight: 600;
      margin-right: 0.6em;
      font-size: 0.92rem;
    }
    mark {
      background: #fffacd;
      padding: 1px 4px;
      border-radius: 3px;
    }
    .no-result {
      color: #777;
      text-align: center;
      padding: 4rem 0;
    }
  </style>
</head>
<body>

<div class="container">
  <!-- 타이틀 대신 버전 선택을 최상단에 배치 -->
  <div class="version-row">
    <label for="bibleVersion">성경 번역본:</label>
    <select id="bibleVersion">
      <option value="kornkrvs.json" selected>개역개정</option>
      <option value="korhrvs.json">개역한글</option>
      <option value="korhkjvs.json">흠정역</option>
      <option value="kornrsvs.json">새번역</option>
      <option value="koreasys.json">쉬운성경</option>
      <option value="kordobs.json">우리말성경</option>
      <option value="kortkvs.json">현대인의 성경</option>
      <option value="korklbs.json">현대어</option>
    </select>
  </div>

  <div class="search-row">
    <span class="range-label">검색 범위</span>

    <select id="startBook">
      <option value="">시작 책</option>
    </select>

    <span class="arrow">→</span>

    <select id="endBook">
      <option value="">끝 책</option>
    </select>

    <input id="keyword" placeholder="검색어 입력 (예: 사랑, 하나님)" style="flex:1; min-width:220px;">

    <button id="searchBtn">검색</button>
  </div>

  <div id="result"></div>
</div>

<script>
// ── 데이터 (변경 없음) ────────────────────────────────────────────────
const BookList = [
  "창세기","출애굽기","레위기","민수기","신명기","여호수아","사사기","룻기",
  "사무엘상","사무엘하","열왕기상","열왕기하","역대상","역대하","에스라","느헤미야","에스더",
  "욥기","시편","잠언","전도서","아가","이사야","예레미야","예레미야애가","에스겔","다니엘",
  "호세아","요엘","아모스","오바댜","요나","미가","나훔","하박국","스바냐","학개","스가랴","말라기",
  "마태복음","마가복음","누가복음","요한복음","사도행전",
  "로마서","고린도전서","고린도후서","갈라디아서","에베소서","빌립보서","골로새서",
  "데살로니가전서","데살로니가후서","디모데전서","디모데후서","디도서","빌레몬서","히브리서",
  "야고보서","베드로전서","베드로후서","요한일서","요한이서","요한삼서","유다서","요한계시록"
];

const BookChapterCount = {
  "창세기":50,"출애굽기":40,"레위기":27,"민수기":36,"신명기":34,"여호수아":24,"사사기":21,"룻기":4,
  "사무엘상":31,"사무엘하":24,"열왕기상":22,"열왕기하":25,"역대상":29,"역대하":36,"에스라":10,"느헤미야":13,"에스더":10,
  "욥기":42,"시편":150,"잠언":31,"전도서":12,"아가":8,"이사야":66,"예레미야":52,"예레미야애가":5,"에스겔":48,"다니엘":12,
  "호세아":14,"요엘":3,"아모스":9,"오바댜":1,"요나":4,"미가":7,"나훔":3,"하박국":3,"스바냐":3,"학개":2,"스가랴":14,"말라기":4,
  "마태복음":28,"마가복음":16,"누가복음":24,"요한복음":21,"사도행전":28,
  "로마서":16,"고린도전서":16,"고린도후서":13,"갈라디아서":6,"에베소서":6,"빌립보서":4,"골로새서":4,
  "데살로니가전서":5,"데살로니가후서":3,"디모데전서":6,"디모데후서":4,"디도서":3,"빌레몬서":1,"히브리서":13,
  "야고보서":5,"베드로전서":5,"베드로후서":3,"요한일서":5,"요한이서":1,"요한삼서":1,"유다서":1,"요한계시록":22
};

let BibleData = null;

// DOM
const versionSelect   = document.getElementById("bibleVersion");
const startBookSelect = document.getElementById("startBook");
const endBookSelect   = document.getElementById("endBook");
const keywordInput    = document.getElementById("keyword");
const searchBtn       = document.getElementById("searchBtn");
const resultDiv       = document.getElementById("result");

// ── 초기화 ───────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  // 책 목록 채우기
  BookList.forEach(book => {
    [startBookSelect, endBookSelect].forEach(sel => {
      const opt = document.createElement("option");
      opt.value = book;
      opt.textContent = book;
      sel.appendChild(opt);
    });
  });

  // 초기값 : 전체 범위
  startBookSelect.value = BookList[0];
  endBookSelect.value   = BookList[BookList.length - 1];

  // 첫 데이터 로드
  loadBible(versionSelect.value);
});

// ── 데이터 로드 ──────────────────────────────────────────────────────
async function loadBible(file) {
  try {
    const res = await fetch(file);
    if (!res.ok) throw new Error("파일 로드 실패");
    BibleData = await res.json();
  } catch (err) {
    resultDiv.innerHTML = `<p style="color:red; text-align:center;">성경 파일 로드 실패: ${err.message}</p>`;
  }
}

// ── 검색 ─────────────────────────────────────────────────────────────
searchBtn.addEventListener('click', async () => {
  const kw = keywordInput.value.trim();
  if (!kw) {
    resultDiv.innerHTML = '<p style="color:#777; text-align:center; padding:3rem 0;">검색어를 입력해주세요.</p>';
    return;
  }

  resultDiv.innerHTML = '<p style="color:#777; text-align:center; padding:4rem 0;">검색 중...</p>';

  if (!BibleData || versionSelect.value !== (document.querySelector("#bibleVersion").dataset.loaded || "")) {
    await loadBible(versionSelect.value);
    document.querySelector("#bibleVersion").dataset.loaded = versionSelect.value;
  }

  if (!BibleData) return;

  const lowerKw = kw.toLowerCase();
  const bookGroups = {};
  let totalCount = 0;

  const startIdx = BookList.indexOf(startBookSelect.value);
  const endIdx   = BookList.indexOf(endBookSelect.value);

  for (let i = startIdx; i <= endIdx; i++) {
    const book = BookList[i];
    const chapters = BibleData.books?.[book];
    if (!chapters) continue;

    let bookVersesByChapter = {};

    for (const chStr in chapters) {
      const verses = chapters[chStr];
      let chapterVerses = [];

      for (const v in verses) {
        const text = verses[v];
        if (typeof text !== "string") continue;
        if (!text.toLowerCase().includes(lowerKw)) continue;

        const highlighted = text.replace(
          new RegExp(kw.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"), "gi"),
          m => `<mark>${m}</mark>`
        );

        chapterVerses.push(`<span class="verse-num">${v}</span>${highlighted}`);
        totalCount++;
      }

      if (chapterVerses.length > 0) {
        bookVersesByChapter[chStr] = chapterVerses;
      }
    }

    if (Object.keys(bookVersesByChapter).length > 0) {
      bookGroups[book] = bookVersesByChapter;
    }
  }

  if (totalCount === 0) {
    resultDiv.innerHTML = '<p style="color:#777; text-align:center; padding:3rem 0;">검색 결과가 없습니다.</p>';
    return;
  }

  let html = `
    <div class="total-info">
      총 ${totalCount}개 구절이 검색되었습니다.
    </div>
  `;

  for (const book in bookGroups) {
    html += `<div class="book-header">${book}</div>`;

    const chapters = bookGroups[book];
    for (const ch in chapters) {
      html += `
        <div class="chapter-block">
          <div class="chapter-title">${ch}장</div>
          ${chapters[ch].map(v => `<div class="verse-text">${v}</div>`).join('')}
        </div>
      `;
    }
  }

  resultDiv.innerHTML = html;
});
</script>
</body>
</html>
