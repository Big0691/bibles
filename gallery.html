<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>1.jpg ~ 자동 불러오기 갤러리</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #0d0d0d;
      color: #ddd;
      font-family: Arial, sans-serif;
    }
    header {
      text-align: center;
      margin: 30px 0;
    }
    .back-btn {
      padding: 12px 28px;
      font-size: 1.1rem;
      background: #1e88e5;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
    }
    .back-btn:hover { background: #1565c0; }
.gallery {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}
.gallery img {
  max-width: 100%;
  height: auto;
  border-radius: 10px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.7);
  display: block;
}
    .gallery img.loaded {
      opacity: 1;
    }
    #status {
      text-align: center;
      margin: 20px 0;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <h1>앱 사용 메뉴얼</h1>
  <a href="index.html" class="back-btn">메인으로 돌아가기</a>
</header>

<div id="status">이미지 로딩 중... (최대 200장까지 시도)</div>

<div class="gallery" id="gallery"></div>

<script>
// ---------------- 설정 ----------------
const folder = "images/";           // 폴더 경로 (같은 폴더면 "./images/" 또는 "images/")
const extension = ".jpg";           // .jpg, .png, .webp 등
const startNumber = 1;
const maxTry = 200;                 // 안전장치: 무한 루프 방지 (필요하면 늘리세요)
const padLength = 0;                // 001.jpg 형식이면 3, 1.jpg면 0 또는 1

// 제로 패딩 함수 (필요 시)
function pad(num, size) {
  if (size <= 0) return num;
  return ('000000000' + num).slice(-size);
}

// ---------------- 메인 로직 ----------------
const gallery = document.getElementById('gallery');
const status = document.getElementById('status');
let loadedCount = 0;

function tryLoadImage(num) {
  if (num > maxTry) {
    finishLoading();
    return;
  }

  const numStr = pad(num, padLength);
  const src = folder + numStr + extension;

  const img = document.createElement('img');
  img.alt = numStr + extension;
  img.loading = "lazy";

  // 로드 성공 → 표시
  img.onload = () => {
    img.classList.add('loaded');
    loadedCount++;
    status.textContent = `${loadedCount}장 로드 완료 (최근: ${numStr})`;
    tryLoadImage(num + 1);   // 다음 번호 시도
  };

  // 로드 실패 → 다음 번호로 바로 진행 (이미지 숨김)
  img.onerror = () => {
    img.remove();            // 실패한 img 요소 삭제
    tryLoadImage(num + 1);   // 다음 시도
  };

  img.src = src;
  gallery.appendChild(img);
}

function finishLoading() {
  if (loadedCount === 0) {
    status.textContent = "이미지를 찾을 수 없습니다. (images/1.jpg ~ 확인해주세요)";
  } else {
    status.textContent = `총 ${loadedCount}장 로드 완료!`;
  }
}

// 시작!
tryLoadImage(startNumber);
</script>

</body>
</html>
