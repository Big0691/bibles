<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>이미지 자동 갤러리</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0d0d0d;
      color: #ddd;
      font-family: Arial, sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: #111;
      padding: 15px;
      text-align: center;
      border-bottom: 1px solid #333;
    }
    .back-btn {
      padding: 12px 30px;
      font-size: 1.1rem;
      background: #0066cc;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }
    .back-btn:hover {
      background: #0055aa;
    }
    .gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .gallery img {
      max-width: 100%;
      height: auto;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.7);
      display: block;
    }
    #status {
      text-align: center;
      margin: 20px 0;
      color: #aaa;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="back-btn">← 메인으로 돌아가기</a>
</header>

<div id="status">이미지 로딩 중...</div>

<div class="gallery" id="gallery"></div>

<script>
const folder = "/images/";
const extension = ".jpg";
const startNumber = 1;
const maxTry = 3;
const padLength = 0;

function pad(num, size) {
  if (size <= 0) return num;
  return ('000000000' + num).slice(-size);
}

const gallery = document.getElementById('gallery');
const status = document.getElementById('status');
let loadedCount = 0;

function tryLoadImage(num) {
  if (num > maxTry) {
    status.textContent = loadedCount === 0 ? "이미지를 찾을 수 없습니다." : `총 ${loadedCount}장 로드 완료`;
    return;
  }

  const numStr = pad(num, padLength);
  const src = folder + numStr + extension;

  const img = document.createElement('img');
  img.alt = numStr + extension;
  img.loading = "lazy";

  img.onload = () => {
    loadedCount++;
    status.textContent = `${loadedCount}장 로드 완료`;
    tryLoadImage(num + 1);
  };

  img.onerror = () => {
    img.remove();
    tryLoadImage(num + 1);
  };

  img.src = src;
  gallery.appendChild(img);
}

tryLoadImage(startNumber);
</script>

</body>
</html>
